# Cloudflare Pages + D1
# 部署前：在 Dashboard 创建 D1 数据库，将 database_id 填到下方；或直接在 Dashboard 绑定 D1 到 Pages 项目
name = "gardenassit"
pages_build_output_dir = "./dist"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "gardenassist"
database_id = "5b295bd6-c85f-453b-ba51-11d044fc887a"

# 照片上传（R2 桶需已在账号下创建）
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "gardenassit-uploads"

